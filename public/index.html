<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Analytics — Widget-to-Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0e0e0c;
    --paper: #f0ede6;
    --surface: #e8e4dc;
    --accent: #e8ff00;
    --red: #ff3c00;
    --muted: #6e6b63;
    --border: 1.5px solid var(--ink);
    --thin: 1px solid rgba(14,14,12,0.18);
    --selected-glow: 0 0 0 2px var(--ink);
  }

  html, body {
    height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    line-height: 1.5;
    overflow: hidden;
  }

  /* ─── LAYOUT ─── */
  .app {
    display: grid;
    grid-template-rows: 48px 1fr;
    height: 100vh;
  }

  /* ─── TOPBAR ─── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: var(--border);
    padding: 0 24px;
    background: var(--ink);
    color: var(--paper);
  }
  .topbar-brand {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: -0.5px;
    text-transform: uppercase;
  }
  .topbar-brand span { color: var(--accent); }
  .topbar-meta {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(240,237,230,0.5);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .live-pip {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
    animation: pip 1.6s ease-in-out infinite;
  }
  @keyframes pip { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* ─── PANELS ─── */
  .panels {
    display: grid;
    grid-template-columns: 420px 1fr;
    height: 100%;
    overflow: hidden;
  }

  /* ─── LEFT PANEL ─── */
  .left-panel {
    border-right: var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--paper);
  }
  .panel-header {
    padding: 14px 20px 12px;
    border-bottom: var(--thin);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .panel-label {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .panel-hint {
    font-size: 9px;
    letter-spacing: 0.06em;
    color: var(--muted);
    font-style: italic;
  }
  .widgets-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .widgets-list::-webkit-scrollbar { width: 3px; }
  .widgets-list::-webkit-scrollbar-thumb { background: var(--ink); }

  /* ─── WIDGET CARD ─── */
  .widget-card {
    border: var(--border);
    background: var(--paper);
    cursor: pointer;
    position: relative;
    transition: background 0.12s;
    user-select: none;
  }
  .widget-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: transparent;
    transition: background 0.18s;
  }
  .widget-card:hover { background: var(--surface); }
  .widget-card:hover::before { background: rgba(14,14,12,0.15); }

  /* SELECTED STATE */
  .widget-card.selected {
    background: var(--ink);
    color: var(--paper);
  }
  .widget-card.selected::before { background: var(--accent); }
  .widget-card.selected .widget-label,
  .widget-card.selected .widget-meta,
  .widget-card.selected .bar-axis,
  .widget-card.selected .spark-label { color: rgba(240,237,230,0.55); }
  .widget-card.selected .bar-fill { background: var(--accent); }
  .widget-card.selected .donut-track { stroke: rgba(240,237,230,0.15); }
  .widget-card.selected .donut-fill { stroke: var(--accent); }
  .widget-card.selected .spark-line { stroke: var(--accent); }
  .widget-card.selected .stat-delta.up { color: var(--accent); }
  .widget-card.selected .stat-delta.dn { color: #ff6b4a; }
  .widget-card.selected .tag { background: rgba(232,255,0,0.15); color: var(--accent); border-color: rgba(232,255,0,0.3); }
  .widget-card.selected .mini-bar { background: rgba(240,237,230,0.2); }
  .widget-card.selected .mini-bar-fill { background: var(--accent); }

  .widget-inner { padding: 16px 16px 14px 20px; }
  .widget-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .widget-label {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 3px;
  }
  .widget-title {
    font-family: 'Syne', sans-serif;
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -1.5px;
    line-height: 1;
  }
  .widget-title .unit {
    font-size: 16px;
    letter-spacing: -0.5px;
    opacity: 0.6;
  }
  .widget-meta {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }
  .stat-delta {
    font-size: 11px;
    font-weight: 700;
  }
  .stat-delta.up { color: #1a9e5c; }
  .stat-delta.dn { color: var(--red); }

  .select-badge {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border: 1px solid currentColor;
    opacity: 0;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .widget-card.selected .select-badge { opacity: 1; color: var(--accent); border-color: var(--accent); }

  /* Bar chart in widget */
  .mini-bars {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 44px;
    margin-top: 8px;
  }
  .mini-bar {
    flex: 1;
    background: rgba(14,14,12,0.1);
    position: relative;
    transition: all 0.12s;
  }
  .mini-bar-fill {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: var(--ink);
    transition: height 0.6s cubic-bezier(0.22,1,0.36,1);
  }
  .mini-bar.hi .mini-bar-fill { background: var(--red); }
  .widget-card.selected .mini-bar.hi .mini-bar-fill { background: #ff6b4a; }
  .bar-axis {
    display: flex;
    justify-content: space-between;
    font-size: 8px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.05em;
  }

  /* Donut in widget */
  .donut-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 8px;
  }
  .donut-svg { flex-shrink: 0; }
  .donut-track { fill: none; stroke: rgba(14,14,12,0.1); stroke-width: 6; }
  .donut-fill {
    fill: none;
    stroke: var(--ink);
    stroke-width: 6;
    stroke-linecap: butt;
    stroke-dasharray: 0 100;
    transition: stroke-dasharray 1s cubic-bezier(0.22,1,0.36,1);
  }
  .donut-legend { display: flex; flex-direction: column; gap: 4px; }
  .legend-row { display: flex; align-items: center; gap: 6px; font-size: 10px; }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* Sparkline in widget */
  .spark-svg { width: 100%; height: 48px; margin-top: 8px; overflow: visible; }
  .spark-line {
    fill: none;
    stroke: var(--ink);
    stroke-width: 1.5;
    stroke-linejoin: round;
    stroke-linecap: round;
  }
  .spark-area {
    opacity: 0.08;
    transition: opacity 0.2s;
  }
  .widget-card.selected .spark-area { opacity: 0.2; fill: var(--accent); }
  .spark-labels {
    display: flex;
    justify-content: space-between;
    font-size: 8px;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.05em;
  }
  .spark-label { }

  /* Tags */
  .tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
  .tag {
    font-size: 9px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 2px 7px;
    border: 1px solid rgba(14,14,12,0.2);
    color: var(--muted);
    transition: all 0.12s;
  }

  /* ─── RIGHT PANEL ─── */
  .right-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--paper);
    position: relative;
  }

  /* EMPTY STATE */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: opacity 0.25s;
    pointer-events: none;
  }
  .empty-state.hidden { opacity: 0; display: none; }
  .empty-arrow {
    font-family: 'Syne', sans-serif;
    font-size: 48px;
    font-weight: 800;
    color: rgba(14,14,12,0.08);
    letter-spacing: -2px;
  }
  .empty-text {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(14,14,12,0.3);
  }

  /* CHAT VIEW */
  .chat-view {
    display: none;
    flex-direction: column;
    height: 100%;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.28s ease, transform 0.28s cubic-bezier(0.22,1,0.36,1);
  }
  .chat-view.visible {
    display: flex;
    opacity: 1;
    transform: translateY(0);
  }

  /* CONTEXT HEADER */
  .context-bar {
    border-bottom: var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--ink);
    color: var(--paper);
    flex-shrink: 0;
  }
  .context-icon {
    width: 32px; height: 32px;
    border: 1px solid rgba(240,237,230,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .context-label {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(240,237,230,0.45);
    margin-bottom: 1px;
  }
  .context-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .context-value {
    margin-left: auto;
    text-align: right;
  }
  .context-num {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -1px;
    color: var(--accent);
    line-height: 1;
  }
  .context-delta { font-size: 10px; color: rgba(240,237,230,0.5); margin-top: 1px; }

  /* THREAD */
  .thread {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .thread::-webkit-scrollbar { width: 3px; }
  .thread::-webkit-scrollbar-thumb { background: rgba(14,14,12,0.3); }

  .msg {
    display: grid;
    grid-template-columns: 28px 1fr;
    gap: 10px;
    align-items: start;
    opacity: 0;
    transform: translateY(5px);
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .msg.in { opacity: 1; transform: none; }

  .msg-av {
    width: 28px; height: 28px;
    border: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; letter-spacing: 0.05em;
    flex-shrink: 0; margin-top: 1px;
    background: var(--paper);
  }
  .msg-av.ai { background: var(--ink); color: var(--paper); }

  .msg-who { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
  .msg-body { font-size: 12px; line-height: 1.65; }
  .msg-body p { margin-bottom: 6px; }
  .msg-body p:last-child { margin-bottom: 0; }

  /* AI response card */
  .ai-card {
    border: var(--border);
    margin-top: 8px;
    background: var(--surface);
  }
  .ai-card-head {
    border-bottom: 1px solid rgba(14,14,12,0.12);
    padding: 8px 12px;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex; align-items: center; justify-content: space-between;
  }
  .ai-card-body { padding: 12px; }
  .ai-stat-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    border: 1px solid rgba(14,14,12,0.15);
  }
  .ai-stat {
    padding: 10px 10px 8px;
    border-right: 1px solid rgba(14,14,12,0.15);
  }
  .ai-stat:last-child { border-right: none; }
  .ai-stat-lbl { font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
  .ai-stat-val { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: -0.5px; line-height: 1; }
  .ai-stat-sub { font-size: 9px; color: var(--muted); margin-top: 2px; }

  /* Inline highlight */
  .hi { background: var(--accent); padding: 0 2px; color: var(--ink); }
  .hi-red { background: var(--red); padding: 0 2px; color: #fff; }

  /* Mini inline bar */
  .inline-bar-wrap {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-top: 8px;
  }
  .inline-bar-row {
    display: grid;
    grid-template-columns: 130px 1fr auto;
    align-items: center;
    gap: 8px;
    font-size: 10px;
  }
  .inline-track {
    height: 5px;
    background: rgba(14,14,12,0.1);
    overflow: hidden;
  }
  .inline-fill {
    height: 100%;
    background: var(--ink);
    transform-origin: left;
    transform: scaleX(0);
    transition: transform 0.8s cubic-bezier(0.22,1,0.36,1);
  }
  .inline-pct { font-weight: 700; font-size: 10px; min-width: 28px; text-align: right; }

  /* TYPING INDICATOR */
  .typing-indicator {
    display: none;
    grid-template-columns: 28px 1fr;
    gap: 10px;
    align-items: center;
  }
  .typing-indicator.show { display: grid; }
  .typing-dots { display: flex; gap: 4px; padding: 4px 0; }
  .typing-dot {
    width: 5px; height: 5px;
    background: var(--muted);
    border-radius: 50%;
    animation: tdot 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes tdot { 0%,60%,100%{opacity:0.2;transform:scale(0.8)} 30%{opacity:1;transform:scale(1)} }

  /* INPUT ROW */
  .input-row {
    border-top: var(--border);
    display: flex;
    flex-shrink: 0;
  }
  .chat-input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--ink);
    padding: 12px 16px;
    outline: none;
  }
  .chat-input::placeholder { color: rgba(14,14,12,0.3); font-style: italic; }
  .send-btn {
    border: none;
    border-left: var(--border);
    background: var(--ink);
    color: var(--paper);
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0 20px;
    cursor: pointer;
    transition: background 0.14s;
    white-space: nowrap;
  }
  .send-btn:hover { background: var(--red); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* TRANSITION FLASH — the visual "moment" */
  .panel-flash {
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    pointer-events: none;
    z-index: 10;
    transition: opacity 0.05s;
  }
  .panel-flash.flash {
    animation: flashAnim 0.38s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes flashAnim {
    0%   { opacity: 0.55; }
    35%  { opacity: 0.18; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-brand">Learning<span>Analytics</span></div>
    <div class="topbar-meta">
      <span><span class="live-pip"></span>Live · Q2 2025</span>
      <span>47 Active Learners</span>
      <span>Manager View</span>
    </div>
  </header>

  <!-- PANELS -->
  <div class="panels">

    <!-- LEFT: WIDGETS -->
    <aside class="left-panel">
      <div class="panel-header">
        <span class="panel-label">Data Widgets</span>
        <span class="panel-hint">Click any widget to analyse →</span>
      </div>
      <div class="widgets-list" id="widgetsList"></div>
    </aside>

    <!-- RIGHT: CHAT -->
    <main class="right-panel" id="rightPanel">
      <div class="panel-flash" id="panelFlash"></div>

      <!-- EMPTY STATE -->
      <div class="empty-state" id="emptyState">
        <div class="empty-arrow">← SELECT</div>
        <div class="empty-text">Choose a widget to start analysing</div>
      </div>

      <!-- CHAT VIEW -->
      <div class="chat-view" id="chatView">
        <div class="context-bar" id="contextBar">
          <div class="context-icon" id="ctxIcon"></div>
          <div>
            <div class="context-label">Analysing widget</div>
            <div class="context-title" id="ctxTitle"></div>
          </div>
          <div class="context-value">
            <div class="context-num" id="ctxNum"></div>
            <div class="context-delta" id="ctxDelta"></div>
          </div>
        </div>

        <div class="thread" id="thread"></div>

        <div class="input-row">
          <input class="chat-input" id="chatInput" placeholder="Ask about this widget…" disabled />
          <button class="send-btn" id="sendBtn" disabled onclick="handleSend()">Ask ↗</button>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
const WIDGETS = [
  {
    id: 'completion',
    icon: '✓',
    label: 'Completion Rate',
    value: '74', unit: '%',
    delta: '+12%', deltaDir: 'up',
    meta: 'vs last month · 47 active learners',
    type: 'bars',
    tags: ['Engagement', 'Weekly'],
    chartData: {
      bars: [45,62,38,70,80,28,18],
      labels: ['M','T','W','T','F','S','S'],
      hiIdx: 4
    },
    context: 'Completion rate this month is 74%, up 12% from last month. Friday is peak completion day at 80%. Weekend engagement drops significantly.',
    prefill: 'Why did completion rate drop on Wednesday?',
    aiReply: {
      text: 'Wednesday shows a <span class="hi">38% dip</span> — the lowest weekday. Cross-referencing with session data, learners averaged only <span class="hi-red">19 min</span> on Wednesday vs. 42 min on Friday. Two factors likely explain this:',
      card: {
        title: 'Wednesday drop — root causes',
        stats: [
          { lbl: 'Avg session', val: '19m', sub: 'Wed vs 42m Fri' },
          { lbl: 'Drop-off point', val: 'Unit 3', sub: 'Module 4' },
          { lbl: 'Affected users', val: '14', sub: 'of 47 active' }
        ],
        bars: [
          { label: 'Calendar conflict (est.)', pct: 0.62 },
          { label: 'Content length (Unit 3)', pct: 0.38 }
        ]
      },
      followText: 'Recommend shortening Unit 3 to under 20 min, or scheduling it on Tuesday when engagement is higher.'
    }
  },
  {
    id: 'quiz',
    icon: '?',
    label: 'Quiz Pass Rate',
    value: '81', unit: '%',
    delta: '-3% this week', deltaDir: 'dn',
    meta: 'Across all active modules',
    type: 'donut',
    tags: ['Assessment', 'Weekly Drop'],
    chartData: {
      pass: 81, fail: 19,
      legend: [
        { color: '#0e0e0c', label: 'Passed', val: '81%' },
        { color: 'rgba(14,14,12,0.15)', label: 'Needs retry', val: '19%' }
      ]
    },
    context: 'Quiz pass rate is 81%, but dropped 3% this week. Failures are concentrated in Module 4 — Security Essentials.',
    prefill: 'Which module is dragging the quiz pass rate down?',
    aiReply: {
      text: '<span class="hi-red">Module 4</span> (Security Essentials) accounts for the full 3% drop. Its pass rate fell to <span class="hi">61%</span> this week — well below the platform average of 81%.',
      card: {
        title: 'Pass rate by module — this week',
        stats: [
          { lbl: 'Data Fundamentals', val: '91%', sub: '↑ stable' },
          { lbl: 'Python Basics', val: '84%', sub: '→ steady' },
          { lbl: 'Security Essentials', val: '61%', sub: '↓ -20pp' }
        ],
        bars: [
          { label: 'Data Fundamentals', pct: 0.91 },
          { label: 'Python Basics', pct: 0.84 },
          { label: 'Security Essentials', pct: 0.61 }
        ]
      },
      followText: 'The quiz for Security Essentials introduced two new question types this cycle. Consider a content review or adding a practice quiz before the graded attempt.'
    }
  },
  {
    id: 'session',
    icon: '◷',
    label: 'Avg. Session Time',
    value: '42', unit: 'm',
    delta: '+8m from baseline', deltaDir: 'up',
    meta: 'Per active learner · 7-day avg',
    type: 'spark',
    tags: ['Engagement', 'Time-on-task'],
    chartData: {
      points: [28,31,34,29,38,42,40],
      labels: ['W1','W2','W3','W4','W5','W6','W7']
    },
    context: 'Average session time is 42 minutes, up 8 minutes from the 34-minute baseline. Trend is consistently upward over the past 7 weeks.',
    prefill: 'Is the increase in session time improving outcomes?',
    aiReply: {
      text: 'Session time correlates positively with pass rates. Learners averaging <span class="hi">40+ min</span> sessions pass at <span class="hi">89%</span>, while those under 20 min pass at only <span class="hi-red">54%</span>.',
      card: {
        title: 'Pass rate by session length bracket',
        stats: [
          { lbl: '0–20 min', val: '54%', sub: '11 learners' },
          { lbl: '20–40 min', val: '76%', sub: '22 learners' },
          { lbl: '40+ min', val: '89%', sub: '14 learners' }
        ],
        bars: [
          { label: '40+ min sessions', pct: 0.89 },
          { label: '20–40 min sessions', pct: 0.76 },
          { label: 'Under 20 min', pct: 0.54 }
        ]
      },
      followText: 'The 11 learners in the under-20-min bracket are the highest-risk group. A nudge notification at the 15-min mark could extend their sessions before they exit.'
    }
  },
  {
    id: 'enrolment',
    icon: '↗',
    label: 'New Enrolments',
    value: '23', unit: '',
    delta: '+9 this week', deltaDir: 'up',
    meta: 'Advanced Python · top growth module',
    type: 'bars',
    tags: ['Growth', 'Module Trend'],
    chartData: {
      bars: [4,6,5,8,9,7,10],
      labels: ['W1','W2','W3','W4','W5','W6','W7'],
      hiIdx: 6
    },
    context: 'Advanced Python saw 23 new enrolments this week — the highest of any module. Growth has been consistent for 7 weeks.',
    prefill: 'What is driving the spike in Advanced Python enrolments?',
    aiReply: {
      text: 'Three signals explain the <span class="hi">Advanced Python spike</span>: a referral chain from the Python Basics cohort, a manager-recommended learning path issued 2 weeks ago, and two internal job postings requiring Python skills.',
      card: {
        title: 'Enrolment source breakdown',
        stats: [
          { lbl: 'Internal referral', val: '13', sub: 'learners' },
          { lbl: 'Manager-assigned', val: '7', sub: 'learners' },
          { lbl: 'Self-initiated', val: '3', sub: 'learners' }
        ],
        bars: [
          { label: 'Internal referral', pct: 0.57 },
          { label: 'Manager-assigned', pct: 0.30 },
          { label: 'Self-initiated', pct: 0.13 }
        ]
      },
      followText: 'Referral-driven enrolments tend to have 18% higher completion rates. Consider a formal peer-referral nudge to amplify this effect across other modules.'
    }
  }
];

let selected = null;
let threadMessages = {};
let typing = false;

// ─── BUILD WIDGETS ───
function buildWidget(w) {
  const card = document.createElement('div');
  card.className = 'widget-card';
  card.id = 'w-' + w.id;
  card.setAttribute('role', 'button');
  card.setAttribute('tabindex', '0');
  card.setAttribute('aria-label', w.label + ': ' + w.value + (w.unit||''));

  let chartHTML = '';
  if (w.type === 'bars') {
    const maxH = 40;
    const maxVal = Math.max(...w.chartData.bars);
    chartHTML = `<div class="mini-bars">` +
      w.chartData.bars.map((v, i) => {
        const h = Math.round((v / maxVal) * maxH);
        const hi = i === w.chartData.hiIdx ? ' hi' : '';
        return `<div class="mini-bar${hi}"><div class="mini-bar-fill" data-h="${h}" style="height:0"></div></div>`;
      }).join('') +
    `</div>
    <div class="bar-axis">` +
      w.chartData.labels.map(l => `<span>${l}</span>`).join('') +
    `</div>`;
  } else if (w.type === 'donut') {
    const circ = 2 * Math.PI * 16;
    const dash = ((w.chartData.pass / 100) * circ).toFixed(1);
    const legendHTML = w.chartData.legend.map(l =>
      `<div class="legend-row"><div class="legend-dot" style="background:${l.color}"></div><span>${l.label}: <b>${l.val}</b></span></div>`
    ).join('');
    chartHTML = `<div class="donut-row">
      <svg class="donut-svg" width="54" height="54" viewBox="0 0 54 54">
        <circle class="donut-track" cx="27" cy="27" r="16"/>
        <circle class="donut-fill" cx="27" cy="27" r="16"
          stroke-dasharray="0 ${circ.toFixed(1)}"
          data-dash="${dash} ${(circ - parseFloat(dash)).toFixed(1)}"
          transform="rotate(-90 27 27)"/>
      </svg>
      <div class="donut-legend">${legendHTML}</div>
    </div>`;
  } else if (w.type === 'spark') {
    const pts = w.chartData.points;
    const minV = Math.min(...pts), maxV = Math.max(...pts);
    const W = 380, H = 44;
    const toX = (i) => (i / (pts.length - 1)) * W;
    const toY = (v) => H - ((v - minV) / (maxV - minV)) * (H - 6) - 3;
    const polyline = pts.map((v, i) => `${toX(i).toFixed(1)},${toY(v).toFixed(1)}`).join(' ');
    const area = `M ${pts.map((v,i)=>`${toX(i).toFixed(1)},${toY(v).toFixed(1)}`).join(' L ')} L ${W},${H} L 0,${H} Z`;
    chartHTML = `<svg class="spark-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <path class="spark-area" d="${area}" fill="var(--ink)"/>
      <polyline class="spark-line" points="${polyline}"/>
    </svg>
    <div class="spark-labels">` +
      w.chartData.labels.map(l => `<span class="spark-label">${l}</span>`).join('') +
    `</div>`;
  }

  const deltaClass = w.deltaDir === 'up' ? 'up' : 'dn';

  card.innerHTML = `
    <div class="widget-inner">
      <div class="widget-head">
        <div>
          <div class="widget-label">${w.label}</div>
          <div class="widget-title">${w.value}<span class="unit">${w.unit}</span></div>
          <div class="widget-meta">${w.meta}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <span class="stat-delta ${deltaClass}">${w.delta}</span>
          <span class="select-badge">● Active</span>
        </div>
      </div>
      ${chartHTML}
      <div class="tags">${w.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    </div>`;

  card.addEventListener('click', () => selectWidget(w));
  card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') selectWidget(w); });
  return card;
}

// ─── ANIMATE CHART ───
function animateChart(card) {
  // Bars
  card.querySelectorAll('.mini-bar-fill').forEach(b => {
    setTimeout(() => { b.style.height = b.dataset.h + 'px'; }, 80);
  });
  // Donut
  const donut = card.querySelector('.donut-fill');
  if (donut) {
    setTimeout(() => {
      donut.setAttribute('stroke-dasharray', donut.dataset.dash);
    }, 100);
  }
}

// ─── SELECT WIDGET ───
function selectWidget(w) {
  if (selected === w.id) return;
  selected = w.id;

  // Visual: deselect all, select clicked
  document.querySelectorAll('.widget-card').forEach(c => c.classList.remove('selected'));
  const card = document.getElementById('w-' + w.id);
  card.classList.add('selected');
  animateChart(card);

  // Flash transition
  const flash = document.getElementById('panelFlash');
  flash.classList.remove('flash');
  void flash.offsetWidth;
  flash.classList.add('flash');

  // Hide empty, show chat
  document.getElementById('emptyState').classList.add('hidden');
  const cv = document.getElementById('chatView');
  cv.style.display = 'flex';
  void cv.offsetWidth;
  cv.classList.add('visible');

  // Update context bar
  document.getElementById('ctxIcon').textContent = w.icon;
  document.getElementById('ctxTitle').textContent = w.label;
  document.getElementById('ctxNum').textContent = w.value + (w.unit || '');
  document.getElementById('ctxDelta').textContent = w.delta;

  // Update input placeholder
  const inp = document.getElementById('chatInput');
  inp.placeholder = w.prefill || 'Ask about this widget…';
  inp.disabled = false;
  document.getElementById('sendBtn').disabled = false;

  // Render thread for this widget
  renderThread(w);
}

// ─── RENDER THREAD ───
function renderThread(w) {
  const thread = document.getElementById('thread');
  thread.innerHTML = '';

  if (!threadMessages[w.id]) {
    // Context inject message
    const ctxMsg = makeMsg('AI', 'ai', `
      <p>I'm now looking at <strong>${w.label}</strong>. Here's a quick summary:</p>
      <p>${w.context}</p>
      <p>Ask me anything about this data.</p>
    `);
    thread.appendChild(ctxMsg);
    setTimeout(() => ctxMsg.classList.add('in'), 60);

    // Pre-filled user question + AI answer
    const userMsg = makeMsg('MGR', '', `<p>${w.prefill}</p>`);
    thread.appendChild(userMsg);
    setTimeout(() => userMsg.classList.add('in'), 180);

    const aiMsg = buildAiReply(w.aiReply);
    thread.appendChild(aiMsg);
    setTimeout(() => aiMsg.classList.add('in'), 320);

    // Animate inline bars inside AI response
    setTimeout(() => {
      aiMsg.querySelectorAll('.inline-fill').forEach(f => {
        f.style.transform = `scaleX(${f.dataset.pct})`;
      });
    }, 600);

    threadMessages[w.id] = [
      { role: 'ctx', el: ctxMsg },
      { role: 'user', text: w.prefill },
      { role: 'ai', reply: w.aiReply }
    ];
  } else {
    // Re-render stored messages
    threadMessages[w.id].forEach((m, i) => {
      let el;
      if (m.role === 'ctx') {
        el = m.el.cloneNode(true);
        thread.appendChild(el);
        setTimeout(() => el.classList.add('in'), 50 + i * 80);
      } else if (m.role === 'user') {
        el = makeMsg('MGR', '', `<p>${m.text}</p>`);
        thread.appendChild(el);
        setTimeout(() => el.classList.add('in'), 50 + i * 80);
      } else if (m.role === 'ai') {
        el = buildAiReply(m.reply);
        thread.appendChild(el);
        setTimeout(() => el.classList.add('in'), 50 + i * 80);
        setTimeout(() => {
          el.querySelectorAll('.inline-fill').forEach(f => {
            f.style.transform = `scaleX(${f.dataset.pct})`;
          });
        }, 50 + i * 80 + 300);
      } else if (m.role === 'extra-user') {
        el = makeMsg('MGR', '', `<p>${m.text}</p>`);
        thread.appendChild(el);
        setTimeout(() => el.classList.add('in'), 50 + i * 80);
      } else if (m.role === 'extra-ai') {
        el = makeMsg('AI', 'ai', `<p>${m.text}</p>`);
        thread.appendChild(el);
        setTimeout(() => el.classList.add('in'), 50 + i * 80);
      }
    });
  }
  thread.scrollTop = 0;
}

function makeMsg(label, avClass, bodyHTML) {
  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = `
    <div class="msg-av ${avClass}">${label}</div>
    <div>
      <div class="msg-who">${avClass === 'ai' ? 'AI Coach' : 'You'} · Now</div>
      <div class="msg-body">${bodyHTML}</div>
    </div>`;
  return div;
}

function buildAiReply(reply) {
  const barsHTML = reply.card.bars.map(b => `
    <div class="inline-bar-row">
      <span>${b.label}</span>
      <div class="inline-track"><div class="inline-fill" data-pct="${b.pct}" style="transform:scaleX(0)"></div></div>
      <span class="inline-pct">${Math.round(b.pct * 100)}%</span>
    </div>`).join('');

  const statsHTML = reply.card.stats.map(s => `
    <div class="ai-stat">
      <div class="ai-stat-lbl">${s.lbl}</div>
      <div class="ai-stat-val">${s.val}</div>
      <div class="ai-stat-sub">${s.sub}</div>
    </div>`).join('');

  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = `
    <div class="msg-av ai">AI</div>
    <div>
      <div class="msg-who">AI Coach · Now</div>
      <div class="msg-body">
        <p>${reply.text}</p>
        <div class="ai-card">
          <div class="ai-card-head"><span>${reply.card.title}</span></div>
          <div class="ai-card-body">
            <div class="ai-stat-row">${statsHTML}</div>
            <div class="inline-bar-wrap">${barsHTML}</div>
          </div>
        </div>
        <p style="margin-top:8px">${reply.followText}</p>
      </div>
    </div>`;
  return div;
}

// ─── SEND HANDLER ───
function handleSend() {
  const inp = document.getElementById('chatInput');
  const text = inp.value.trim();
  if (!text || typing) return;
  typing = true;
  inp.value = '';
  inp.disabled = true;
  document.getElementById('sendBtn').disabled = true;

  const thread = document.getElementById('thread');

  // Add user message
  const userMsg = makeMsg('MGR', '', `<p>${text}</p>`);
  thread.appendChild(userMsg);
  requestAnimationFrame(() => userMsg.classList.add('in'));

  // Typing indicator
  const typingEl = document.createElement('div');
  typingEl.className = 'typing-indicator show';
  typingEl.innerHTML = `
    <div class="msg-av ai">AI</div>
    <div class="typing-dots">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>`;
  thread.appendChild(typingEl);
  thread.scrollTop = thread.scrollHeight;

  // Simulated AI response
  const responses = [
    'Based on current data patterns, this is worth monitoring closely. Learners who engage with this metric tend to show <span class="hi">15% better retention</span> over the following two weeks.',
    'The trend here aligns with broader engagement signals. <span class="hi-red">3 learners</span> in this cohort may need a follow-up intervention based on their activity logs.',
    'Good question. This data point is most meaningfully read alongside session time. When both are high, completion rates follow within 5–7 days.',
    'The variance here is statistically significant. I\'d recommend reviewing the affected module\'s content length — it\'s likely the primary driver.'
  ];
  const reply = responses[Math.floor(Math.random() * responses.length)];

  setTimeout(() => {
    typingEl.remove();
    const aiMsg = makeMsg('AI', 'ai', `<p>${reply}</p>`);
    thread.appendChild(aiMsg);
    requestAnimationFrame(() => aiMsg.classList.add('in'));
    thread.scrollTop = thread.scrollHeight;
    typing = false;
    inp.disabled = false;
    document.getElementById('sendBtn').disabled = false;
    inp.focus();

    // Store in thread history
    if (selected && threadMessages[selected]) {
      threadMessages[selected].push({ role: 'extra-user', text });
      threadMessages[selected].push({ role: 'extra-ai', text: reply });
    }
  }, 1400);
}

// ─── INIT ───
const list = document.getElementById('widgetsList');
WIDGETS.forEach(w => list.appendChild(buildWidget(w)));

// Enter key on chat input
document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSend();
});
</script>
